# Optional Conda environment (recommended when installing RDKit on Windows)
name: spectrareason
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.13
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - joblib>=1.3
  - matplotlib>=3.7
  - plotly>=5.18
  - pyyaml>=6.0
  - rdkit
  - pip
  - pip:
      - mordred
      - kaleido>=0.2
      - pytest>=7.0
      - vulture>=2.11
